name: Build for Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# The build environment (pacman packages + pip deps) and the build itself are
# defined once in scripts/vm-win-setup.sh and build_win.sh, so CI and the local
# Windows/VM build stay in lockstep. This workflow is a thin wrapper that just
# runs those phases; do NOT re-list packages or pip installs here.
jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v4

    - name: Cache MSYS2 packages
      uses: actions/cache@v4
      with:
        path: C:/msys64/var/cache/pacman/pkg
        key: msys2-${{ hashFiles('scripts/vm-win-setup.sh') }}-${{ runner.os }}
        restore-keys: |
          msys2-${{ hashFiles('scripts/vm-win-setup.sh') }}-
          msys2-

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: false

    - name: Install dependencies (pacman)
      run: ./scripts/vm-win-setup.sh deps

    - name: Set up Python environment
      run: ./scripts/vm-win-setup.sh venv

    - name: Build
      run: ./scripts/vm-win-setup.sh build

    - name: Smoke test (launch frozen app headless)
      run: ./scripts/vm-win-setup.sh smoketest

    - name: Upload artifacts
      if: always()   # keep the bundle for inspection even if the smoke test failed
      uses: actions/upload-artifact@v4
      with:
        name: byzanz-capture-windows
        path: dist/byzanz-capture
